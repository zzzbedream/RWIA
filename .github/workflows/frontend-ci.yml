name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "keeper/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "keeper/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

jobs:
  app:
    name: app · typecheck + build + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint --if-present
      - run: NODE_OPTIONS=--max-old-space-size=4096 npm run build
      # `high` would fail on transitive vulns inside @metamask/sdk (a wagmi
       # connector dep). We can't pin those without forking. We gate on
       # `critical` (which actually represents an exploit) and surface
       # `high` separately for visibility without blocking the build.
      - name: npm audit (critical, hard gate)
        run: npm audit --audit-level=critical
      - name: npm audit (high, visibility only)
        run: npm audit --audit-level=high || true

  keeper:
    name: keeper · typecheck + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keeper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: keeper/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - name: npm audit (critical, hard gate)
        run: npm audit --audit-level=critical
      - name: npm audit (high, visibility only)
        run: npm audit --audit-level=high || true
