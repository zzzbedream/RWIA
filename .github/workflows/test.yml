name: CI — Forge test & gas snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
    paths:
      - "contracts/**"

defaults:
  run:
    working-directory: contracts

jobs:
  test:
    name: Forge build · test · snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show versions
        run: |
          forge --version
          cast --version

      # contracts/lib/ is gitignored — fetch deps before any forge command.
      - name: Install Foundry libs
        run: |
          forge install --no-git \
            foundry-rs/forge-std \
            OpenZeppelin/openzeppelin-contracts@v5.6.1 \
            OpenZeppelin/openzeppelin-contracts-upgradeable@v5.6.1

      - name: Compile contracts
        run: forge build --sizes

      - name: Run tests (default profile)
        run: forge test -vvv

      - name: Run gas snapshot
        # Match the behavior in contracts-ci.yml: if no baseline yet, generate
        # one rather than fail. The contracts-ci.yml gas-snapshot job is the
        # canonical regression gate.
        run: |
          if [ -f .gas-snapshot ]; then
            forge snapshot --check
          else
            forge snapshot
          fi

  ci-deep:
    name: Deep fuzz (PRs to main only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Foundry libs
        run: |
          forge install --no-git \
            foundry-rs/forge-std \
            OpenZeppelin/openzeppelin-contracts@v5.6.1 \
            OpenZeppelin/openzeppelin-contracts-upgradeable@v5.6.1

      - name: Deep fuzz + invariant
        run: forge test --profile ci -vvvvv